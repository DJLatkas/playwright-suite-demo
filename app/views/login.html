<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AdminKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-root">
    <main class="login-card" aria-labelledby="login-heading">

      <div class="login-logo" aria-hidden="true">
        <div class="login-logo-mark">A</div>
        <span class="login-logo-name">AdminKit</span>
      </div>

      <h1 id="login-heading">Welcome back</h1>
      <p class="subtitle">Sign in to your workspace</p>

      <div
        id="error-message"
        class="alert alert-error hidden"
        role="alert"
        aria-live="assertive"
        data-testid="error-message"
      >
        <span class="alert-icon" aria-hidden="true">⚠</span>
        <span id="error-text">Invalid credentials. Please try again.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control"
            placeholder="Enter your username"
            autocomplete="username"
            required
            data-testid="username-input"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            data-testid="password-input"
          />
        </div>

        <button
          id="login-button"
          type="submit"
          class="btn btn-primary btn-full"
          data-testid="login-button"
        >
          <span id="btn-label">Sign in</span>
          <span
            id="loading-spinner"
            class="btn-spinner hidden"
            aria-hidden="true"
            data-testid="loading-spinner"
          ></span>
        </button>
      </form>

      <p style="margin-top: 24px; font-size: 12px; color: var(--color-text-dim); text-align: center;">
        Demo credentials: <strong style="color: var(--color-text-muted);">admin / password123</strong>
      </p>
    </main>
  </div>

  <script>
    // Redirect if already authenticated
    if (localStorage.getItem('auth_token')) {
      window.location.replace('/dashboard');
    }

    const form      = document.getElementById('login-form');
    const btn       = document.getElementById('login-button');
    const btnLabel  = document.getElementById('btn-label');
    const spinner   = document.getElementById('loading-spinner');
    const errorBox  = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');

    function setLoading(on) {
      btn.disabled = on;
      btnLabel.textContent = on ? 'Signing in…' : 'Sign in';
      spinner.classList.toggle('hidden', !on);
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function clearError() {
      errorBox.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) {
        document.getElementById('username').focus();
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('auth_user', data.username);
          window.location.replace('/dashboard');
        } else {
          showError(data.error ?? 'Login failed. Please try again.');
          setLoading(false);
        }
      } catch {
        showError('Network error. Please check your connection.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
