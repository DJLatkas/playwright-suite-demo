<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — AdminKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark" aria-hidden="true">A</div>
        <span class="sidebar-logo-name">AdminKit</span>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <span class="nav-section-label">Workspace</span>

        <a href="/dashboard" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>

        <a href="/controls" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M11 8h10M3 8H1"/><circle cx="16" cy="16" r="3"/><path d="M19 16h2M11 16H1"/></svg>
          Playground
        </a>

        <a href="/reports" class="nav-item active" aria-current="page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Reports
        </a>

        <span class="nav-section-label">Settings</span>

        <a href="#" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="user-avatar" aria-hidden="true">A</div>
          <div class="user-info">
            <div class="user-name" id="user-name-display">admin</div>
            <div class="user-role">Administrator</div>
          </div>
          <button
            class="btn-icon"
            id="logout-button"
            title="Sign out"
            aria-label="Sign out"
            data-testid="logout-button"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ── Main content ────────────────────────────────────────────── -->
    <div class="main-content">

      <header class="topbar">
        <div>
          <div class="page-title">Reports</div>
          <div class="page-subtitle">Analytics and activity overview</div>
        </div>
        <button
          class="btn btn-primary"
          id="export-csv-button"
          data-testid="export-csv-button"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </header>

      <div class="content-area">

        <!-- Summary cards -->
        <div class="stats-strip" role="region" aria-label="Summary statistics">
          <div class="stat-card">
            <div class="stat-label">Total users</div>
            <div class="stat-value" id="reports-stat-total" data-testid="reports-stat-total">—</div>
            <div class="stat-sub">across all roles</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active</div>
            <div class="stat-value stat-active" id="reports-stat-active" data-testid="reports-stat-active">—</div>
            <div class="stat-sub">currently enabled</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Inactive</div>
            <div class="stat-value stat-inactive" id="reports-stat-inactive" data-testid="reports-stat-inactive">—</div>
            <div class="stat-sub">access suspended</div>
          </div>
        </div>

        <!-- Role breakdown -->
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-header">
            <span class="card-title">Role Breakdown</span>
          </div>
          <div id="role-breakdown" style="padding: 24px;" aria-label="Role breakdown chart">
            <p style="color: var(--color-text-muted); font-size: 13px;">Loading…</p>
          </div>
        </div>

        <!-- Activity log -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Activity Log</span>
            <div class="card-actions">
              <label for="date-from" class="sr-only">From date</label>
              <input
                type="date"
                id="date-from"
                data-testid="date-from"
                class="form-control"
                style="width: 160px;"
                aria-label="Filter from date"
              />
              <label for="date-to" class="sr-only">To date</label>
              <input
                type="date"
                id="date-to"
                data-testid="date-to"
                class="form-control"
                style="width: 160px;"
                aria-label="Filter to date"
              />
            </div>
          </div>
          <div id="activity-log" data-testid="activity-log" aria-live="polite">
            <p style="padding: 24px; color: var(--color-text-muted); font-size: 13px;">Loading…</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Toast container ──────────────────────────────────────────── -->
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .role-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .role-bar-row:last-child { margin-bottom: 0; }
    .role-bar-label {
      width: 64px;
      font-size: 13px;
      font-weight: 500;
      text-align: right;
      flex-shrink: 0;
    }
    .role-bar-track {
      flex: 1;
      height: 22px;
      background: var(--color-surface-2);
      border-radius: 4px;
      overflow: hidden;
    }
    .role-bar-fill {
      height: 100%;
      border-radius: 4px;
      min-width: 2px;
      transition: width 0.4s ease;
    }
    .role-bar-fill-Admin  { background: rgba(99,102,241,0.75); }
    .role-bar-fill-Editor { background: rgba(245,158,11,0.75); }
    .role-bar-fill-Viewer { background: rgba(100,116,139,0.6); }
    .role-bar-count {
      width: 28px;
      font-size: 13px;
      color: var(--color-text-muted);
      text-align: right;
      flex-shrink: 0;
    }
    .activity-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--color-border);
      font-size: 13.5px;
    }
    .activity-entry:last-child { border-bottom: none; }
    .activity-action {
      font-weight: 600;
      text-transform: capitalize;
      min-width: 52px;
    }
    .activity-action-add    { color: #22c55e; }
    .activity-action-edit   { color: #60a5fa; }
    .activity-action-delete { color: #f87171; }
    .activity-action-toggle { color: #f59e0b; }
    .activity-user { flex: 1; }
    .activity-time {
      color: var(--color-text-dim);
      font-size: 12px;
      flex-shrink: 0;
    }
    .empty-activity {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-muted);
      font-size: 14px;
    }
  </style>

  <script src="/js/reports.js"></script>
</body>
</html>
